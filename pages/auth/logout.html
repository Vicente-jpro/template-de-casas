<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasasPro – Sair da Conta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/custom.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card text-center animate-fade-up" style="max-width:400px">

    <!-- Logo -->
    <div class="auth-logo mb-4">
      <a href="../../index.html" class="text-decoration-none">
        <i class="bi bi-house-heart-fill me-1"></i>Casas<span>Pro</span>
      </a>
    </div>

    <!-- Goodbye icon -->
    <div class="mb-4">
      <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
           style="width:80px;height:80px;background:linear-gradient(135deg,var(--cp-primary),var(--cp-secondary))">
        <i class="bi bi-box-arrow-right text-white fs-2"></i>
      </div>
    </div>

    <h2 class="auth-title mb-2">Sair da Conta</h2>
    <p class="auth-subtitle mb-4">
      Tem a certeza que deseja terminar a sessão como<br>
      <strong class="text-primary-cp">Ana Rodrigues</strong>?
    </p>

    <!-- Actions -->
    <div class="d-flex gap-3">
      <a href="../../index.html" class="btn btn-outline-secondary flex-fill fw-semibold py-2">
        <i class="bi bi-x-circle me-1"></i>Cancelar
      </a>
      <button id="logoutBtn" class="btn-auth flex-fill py-2 d-flex align-items-center justify-content-center gap-2" style="border-radius:.6rem">
        <i class="bi bi-box-arrow-right"></i>Confirmar
      </button>
    </div>

    <p class="text-muted small mt-4 mb-0">
      A sua sessão será encerrada com segurança e será redirecionado para a página inicial.
    </p>
  </div>
</div>

<div id="toastContainer" class="toast-container-cp"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/app.js"></script>
<script>
document.getElementById('logoutBtn').addEventListener('click', function () {
  this.disabled = true;
  this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>A sair…';
  showToast('Sessão terminada com sucesso!', 'success');
  setTimeout(() => { window.location.href = '../../index.html'; }, 1500);
});
</script>
</body>
</html>
