<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasasPro – Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/custom.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card animate-fade-up">

    <!-- Logo -->
    <div class="auth-logo mb-4">
      <a href="../../index.html" class="text-decoration-none">
        <i class="bi bi-house-heart-fill me-1"></i>Casas<span>Pro</span>
      </a>
    </div>

    <h2 class="auth-title mb-1">Bem-vindo de volta</h2>
    <p class="auth-subtitle mb-4">Inicie sessão na sua conta</p>

    <form id="loginForm" novalidate>
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold" for="loginEmail">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input
            type="email"
            class="form-control"
            id="loginEmail"
            name="email"
            placeholder="email@exemplo.com"
            required
            autocomplete="email">
          <div class="invalid-feedback">Introduza um email válido.</div>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label fw-semibold mb-0" for="loginPassword">Password</label>
          <a href="reset-password.html" class="text-primary-cp small text-decoration-none">Esqueceu a senha?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input
            type="password"
            class="form-control"
            id="loginPassword"
            name="password"
            placeholder="••••••••"
            required
            minlength="6"
            autocomplete="current-password">
          <button class="btn btn-outline-secondary password-toggle" type="button" data-target="loginPassword">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">A password é obrigatória (mín. 6 caracteres).</div>
        </div>
      </div>

      <!-- Remember me -->
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="rememberMe" name="remember_me">
        <label class="form-check-label small" for="rememberMe">Manter sessão iniciada</label>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-auth mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <!-- Divider -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <hr class="flex-fill m-0">
      <span class="text-muted small">ou continue com</span>
      <hr class="flex-fill m-0">
    </div>

    <!-- Social login -->
    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-outline-secondary flex-fill fw-semibold" type="button">
        <i class="bi bi-google me-1 text-danger"></i>Google
      </button>
      <button class="btn btn-outline-secondary flex-fill fw-semibold" type="button">
        <i class="bi bi-facebook me-1" style="color:#1877f2"></i>Facebook
      </button>
    </div>

    <p class="text-center text-muted small mb-0">
      Não tem conta?
      <a href="#" class="text-primary-cp fw-semibold text-decoration-none">Registar gratuitamente</a>
    </p>
  </div>
</div>

<div id="toastContainer" class="toast-container-cp"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/app.js"></script>
</body>
</html>
