<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasasPro – Confirmar Conta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/custom.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card text-center animate-fade-up" style="max-width:460px">

    <!-- Logo -->
    <div class="auth-logo mb-4">
      <a href="../../index.html" class="text-decoration-none">
        <i class="bi bi-house-heart-fill me-1"></i>Casas<span>Pro</span>
      </a>
    </div>

    <!-- Icon + states (pending / success) -->
    <div id="pendingState">
      <div class="mb-4">
        <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
             style="width:80px;height:80px;background:linear-gradient(135deg,var(--cp-secondary),#40c9e6)">
          <i class="bi bi-envelope-check text-white fs-2"></i>
        </div>
      </div>

      <h2 class="auth-title mb-2">Confirme a sua Conta</h2>
      <p class="auth-subtitle mb-4">
        Introduza o código de confirmação enviado para<br>
        <strong class="text-primary-cp">ana@email.com</strong>
      </p>

      <form id="confirmForm" novalidate>
        <!-- OTP inputs -->
        <div class="d-flex justify-content-center gap-2 mb-4">
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
          <span class="d-flex align-items-center text-muted fs-4">–</span>
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
          <input type="text" class="form-control text-center fw-bold fs-4 otp-input" maxlength="1" style="width:52px;height:60px" required>
        </div>

        <!-- Hidden token field (for server submission) -->
        <input type="hidden" id="otpToken" name="token">

        <button type="submit" class="btn-auth mb-3">
          <i class="bi bi-patch-check me-2"></i>Confirmar Conta
        </button>
      </form>

      <p class="text-muted small mb-0">
        Não recebeu o email?
        <button id="resendBtn" class="btn btn-link btn-sm text-primary-cp text-decoration-none p-0">Reenviar código</button>
      </p>

      <!-- Countdown timer -->
      <div class="mt-2 text-muted small">
        Reenviar disponível em <span id="countdown" class="fw-semibold">02:00</span>
      </div>
    </div>

    <!-- SUCCESS STATE (hidden initially) -->
    <div id="successState" class="d-none">
      <div class="mb-4">
        <div class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
             style="width:80px;height:80px;background:linear-gradient(135deg,#28a745,#20c997)">
          <i class="bi bi-check-circle text-white fs-2"></i>
        </div>
      </div>
      <h2 class="auth-title mb-2 text-success">Conta Confirmada!</h2>
      <p class="auth-subtitle mb-4">
        A sua conta foi verificada com sucesso.<br>
        Será redirecionado em breve…
      </p>
      <div class="progress mb-3" style="height:6px">
        <div class="progress-bar bg-success" id="redirectProgress" style="width:0%;transition:width 3s linear"></div>
      </div>
      <a href="../../index.html" class="btn btn-primary-cp px-4">
        <i class="bi bi-house me-1"></i>Ir para o Início
      </a>
    </div>

  </div>
</div>

<div id="toastContainer" class="toast-container-cp"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/app.js"></script>
<script>
/* OTP auto-advance */
const inputs = document.querySelectorAll('.otp-input');
inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/, '');
    if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
    document.getElementById('otpToken').value = [...inputs].map(x => x.value).join('');
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
  });
});

/* Countdown timer (2 min) */
let seconds = 120;
const countdownEl = document.getElementById('countdown');
const resendBtn   = document.getElementById('resendBtn');
resendBtn.disabled = true;

const timer = setInterval(() => {
  seconds--;
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  countdownEl.textContent = `${m}:${s}`;
  if (seconds <= 0) {
    clearInterval(timer);
    resendBtn.disabled = false;
    countdownEl.textContent = '';
  }
}, 1000);

resendBtn.addEventListener('click', () => {
  showToast('Código reenviado para o seu email!', 'info');
  resendBtn.disabled = true;
  seconds = 120;
});

/* Form confirm */
document.getElementById('confirmForm').addEventListener('submit', e => {
  e.preventDefault();
  const token = [...inputs].map(x => x.value).join('');
  if (token.length < 6) {
    showToast('Introduza o código completo (6 dígitos).', 'warning');
    return;
  }
  document.getElementById('pendingState').classList.add('d-none');
  document.getElementById('successState').classList.remove('d-none');
  setTimeout(() => {
    document.getElementById('redirectProgress').style.width = '100%';
  }, 50);
  setTimeout(() => { window.location.href = '../../index.html'; }, 3500);
});
</script>
</body>
</html>
